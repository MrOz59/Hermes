name: Build Apollo

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  # ===========================================
  # Windows Build
  # ===========================================
  # Temporarily disabled: Hermes targets Linux hosts, and the Windows build
  # currently fails on a pre-existing Boost.Process v1 inline-namespace
  # incompatibility with the MSYS2 GCC toolchain (unrelated to Hermes). Set
  # `if: false` to skip rather than fail the run; remove to re-enable.
  build-windows:
    if: false
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-boost
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-libnotify
            mingw-w64-ucrt-x86_64-miniupnpc
            mingw-w64-ucrt-x86_64-nlohmann-json
            mingw-w64-ucrt-x86_64-onevpl
            mingw-w64-ucrt-x86_64-MinHook
            mingw-w64-ucrt-x86_64-nodejs
            git

      - name: Configure CMake
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DSUNSHINE_ENABLE_WAYLAND=OFF \
            -DSUNSHINE_ENABLE_X11=OFF \
            -DSUNSHINE_ENABLE_DRM=OFF \
            -DSUNSHINE_ENABLE_CUDA=ON \
            -DFETCHCONTENT_FULLY_DISCONNECTED=OFF

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --config ${{env.BUILD_TYPE}} -j$(nproc)

      - name: Package
        shell: msys2 {0}
        run: |
          mkdir -p package/apollo
          cp build/sunshine*.exe package/apollo/apollo.exe 2>/dev/null || cp build/apollo*.exe package/apollo/ 2>/dev/null || true
          cp -r build/assets/web package/apollo/ 2>/dev/null || true
          
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apollo-windows-x64
          path: package/
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================
  # Arch Linux Package (PKGBUILD)
  # ===========================================
  build-arch-pkg:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    
    steps:
      - name: Setup Arch Linux
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel \
            git \
            cmake \
            ninja \
            boost \
            openssl \
            opus \
            ffmpeg \
            libdrm \
            wayland \
            libx11 \
            libxrandr \
            libxfixes \
            libxcb \
            libva \
            libvdpau \
            libcap \
            curl \
            libnotify \
            libayatana-appindicator \
            libevdev \
            systemd \
            miniupnpc \
            libpulse \
            npm \
            nodejs \
            icu \
            numactl
          
          # Create build user (makepkg can't run as root)
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          
      - name: Fix permissions and git
        run: |
          chown -R builder:builder .
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Build with CMake
        run: |
          su builder -c '
            cmake -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=/usr \
              -DSUNSHINE_ENABLE_WAYLAND=ON \
              -DSUNSHINE_ENABLE_X11=ON \
              -DSUNSHINE_ENABLE_DRM=ON \
              -DSUNSHINE_ENABLE_CUDA=OFF
            cmake --build build -j$(nproc)
          '

      - name: Create Package
        run: |
          VERSION="$(cat VERSION)"
          mkdir -p pkg/usr/bin pkg/usr/share/hermes
          # The build links the binary as sunshine-<version> with a `sunshine`
          # symlink; copy the resolved binary and install it as `hermes`.
          cp -L build/sunshine pkg/usr/bin/hermes
          chmod 755 pkg/usr/bin/hermes
          cp -r build/assets/* pkg/usr/share/hermes/

          # Create simple tarball
          cd pkg && tar -czvf "../hermes-${VERSION}-arch-linux-x86_64.tar.gz" .

      - name: Upload Arch Package
        uses: actions/upload-artifact@v4
        with:
          name: hermes-arch-pkg
          path: "*.tar.gz"
          retention-days: 30
          if-no-files-found: error

  # ===========================================
  # Debian/Ubuntu Package (.deb)
  # ===========================================
  build-deb:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libssl-dev \
            libboost-all-dev \
            libpulse-dev \
            libopus-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libdrm-dev \
            libgbm-dev \
            libwayland-dev \
            libx11-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libva-dev \
            libvdpau-dev \
            libcap-dev \
            libcurl4-openssl-dev \
            libnotify-dev \
            libayatana-appindicator3-dev \
            libevdev-dev \
            libudev-dev \
            libsystemd-dev \
            libminiupnpc-dev \
            libicu-dev \
            libnuma-dev \
            dpkg-dev \
            debhelper \
            nodejs \
            npm

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DSUNSHINE_ENABLE_WAYLAND=ON \
            -DSUNSHINE_ENABLE_X11=ON \
            -DSUNSHINE_ENABLE_DRM=ON \
            -DSUNSHINE_ENABLE_CUDA=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}} -j$(nproc)

      - name: Create DEB Package
        run: |
          VERSION="$(cat VERSION)"
          PKGDIR="hermes_${VERSION}_amd64"

          mkdir -p ${PKGDIR}/DEBIAN
          mkdir -p ${PKGDIR}/usr/bin
          mkdir -p ${PKGDIR}/usr/share/hermes
          mkdir -p ${PKGDIR}/usr/share/applications
          mkdir -p ${PKGDIR}/usr/share/icons/hicolor/scalable/apps
          mkdir -p ${PKGDIR}/usr/share/icons/hicolor/scalable/status
          mkdir -p ${PKGDIR}/usr/lib/systemd/user

          # Install the binary as `hermes` (resolve the sunshine symlink).
          cp -L build/sunshine ${PKGDIR}/usr/bin/hermes
          chmod 755 ${PKGDIR}/usr/bin/hermes

          cp -r build/assets/web ${PKGDIR}/usr/share/hermes/
          cp build/assets/*.png build/assets/*.json ${PKGDIR}/usr/share/hermes/ 2>/dev/null || true

          # Copy icons
          cp src_assets/linux/misc/icons/*.svg ${PKGDIR}/usr/share/icons/hicolor/scalable/apps/ 2>/dev/null || true

          # Create control file
          cat > ${PKGDIR}/DEBIAN/control << EOF
          Package: hermes
          Version: ${VERSION}
          Section: net
          Priority: optional
          Architecture: amd64
          Depends: libssl3, libboost-all-dev, libpulse0, libopus0, libdrm2, libwayland-client0, libx11-6, libva2, libcurl4, libnotify4, libayatana-appindicator3-1, libevdev2, libcap2
          Recommends: evdi-dkms
          Maintainer: Hermes
          Description: Self-hosted game stream host with Linux virtual display support
           Hermes is an Apollo-derived game streaming server with low-latency
           Linux virtual displays via Hermes-KMS (EVDI also supported).
          EOF

          # Create postinst script
          cat > ${PKGDIR}/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          set -e
          setcap cap_sys_admin+p /usr/bin/hermes || true
          if command -v modprobe &> /dev/null; then
            modprobe evdi 2>/dev/null || true
          fi
          gtk-update-icon-cache -f /usr/share/icons/hicolor/ 2>/dev/null || true
          EOF
          chmod 755 ${PKGDIR}/DEBIAN/postinst

          # Create systemd service
          cat > ${PKGDIR}/usr/lib/systemd/user/hermes.service << 'EOF'
          [Unit]
          Description=Hermes Game Streaming Server
          StartLimitIntervalSec=500
          StartLimitBurst=5

          [Service]
          ExecStartPre=/bin/sleep 5
          ExecStart=/usr/bin/hermes
          Restart=on-failure
          RestartSec=5s

          [Install]
          WantedBy=xdg-desktop-autostart.target
          EOF

          # Create desktop file
          cat > ${PKGDIR}/usr/share/applications/hermes.desktop << 'EOF'
          [Desktop Entry]
          Name=Hermes
          Comment=Self-hosted game stream host
          Exec=/usr/bin/env systemctl start --user hermes
          Icon=hermes
          Type=Application
          Categories=Network;RemoteAccess;
          EOF

          # Build package
          dpkg-deb --build ${PKGDIR} hermes_${VERSION}_amd64.deb

      - name: Upload DEB Package
        uses: actions/upload-artifact@v4
        with:
          name: hermes-deb
          path: "*.deb"
          retention-days: 30
          if-no-files-found: error

  # ===========================================
  # Fedora RPM Build
  # ===========================================
  build-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:40
    
    steps:
      - name: Install Dependencies
        run: |
          dnf install -y \
            git \
            cmake \
            ninja-build \
            gcc-c++ \
            boost-devel \
            openssl-devel \
            opus-devel \
            ffmpeg-free-devel \
            libdrm-devel \
            mesa-libgbm-devel \
            wayland-devel \
            libX11-devel \
            libXrandr-devel \
            libXfixes-devel \
            libxcb-devel \
            libva-devel \
            libvdpau-devel \
            libcap-devel \
            libcurl-devel \
            libnotify-devel \
            libayatana-appindicator-gtk3-devel \
            libevdev-devel \
            systemd-devel \
            miniupnpc-devel \
            pulseaudio-libs-devel \
            libicu-devel \
            numactl-devel \
            rpm-build \
            nodejs \
            npm

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Fix git safe directory
        run: git config --global --add safe.directory /__w/Apollo-Linux/Apollo-Linux

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DSUNSHINE_ENABLE_WAYLAND=ON \
            -DSUNSHINE_ENABLE_X11=ON \
            -DSUNSHINE_ENABLE_DRM=ON \
            -DSUNSHINE_ENABLE_CUDA=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Create RPM Package
        run: |
          VERSION="$(cat VERSION)"
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # Create source tarball; install the binary as `hermes`
          # (resolve the sunshine symlink).
          mkdir -p hermes-${VERSION}/usr/bin
          mkdir -p hermes-${VERSION}/usr/share/hermes
          cp -L build/sunshine hermes-${VERSION}/usr/bin/hermes
          chmod 755 hermes-${VERSION}/usr/bin/hermes
          cp -r build/assets/* hermes-${VERSION}/usr/share/hermes/
          tar -czvf ~/rpmbuild/SOURCES/hermes-${VERSION}.tar.gz hermes-${VERSION}

          cat > ~/rpmbuild/SPECS/hermes.spec << EOF
          Name:           hermes
          Version:        ${VERSION}
          Release:        1%{?dist}
          Summary:        Self-hosted game stream host with Linux virtual display support
          License:        GPLv3
          URL:            https://github.com/MrOz59/Hermes
          Source0:        hermes-%{version}.tar.gz

          %description
          Hermes is an Apollo-derived game streaming server with low-latency
          Linux virtual displays via Hermes-KMS (EVDI also supported).

          %prep
          %setup -q

          %install
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/usr/share/hermes
          cp -r usr/bin/* %{buildroot}/usr/bin/
          cp -r usr/share/hermes/* %{buildroot}/usr/share/hermes/

          %files
          %attr(755,root,root) /usr/bin/hermes
          /usr/share/hermes

          %post
          setcap cap_sys_admin+p /usr/bin/hermes || true
          EOF

          rpmbuild -bb ~/rpmbuild/SPECS/hermes.spec
          cp ~/rpmbuild/RPMS/*/*.rpm .

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: hermes-rpm
          path: "*.rpm"
          retention-days: 30
          if-no-files-found: error

  # ===========================================
  # Create Release (on tag)
  # ===========================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-deb, build-arch-pkg, build-rpm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================
  # Nightly Release (rolling prerelease on main)
  # ===========================================
  # Every successful push to main refreshes the single "nightly" prerelease
  # with the latest Linux artifacts. The tag is force-moved to the current
  # commit so the release always points at the newest build.
  nightly:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-deb, build-arch-pkg, build-rpm]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Move nightly tag to current commit
        run: |
          git tag -f nightly "${GITHUB_SHA}"
          git push -f origin "refs/tags/nightly"

      - name: Publish nightly release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: "Hermes nightly (v${{ steps.version.outputs.version }})"
          body: |
            Rolling nightly build of Hermes from the `main` branch.

            - Version: `v${{ steps.version.outputs.version }}`
            - Commit: ${{ github.sha }}
            - Built: ${{ github.event.head_commit.timestamp }}

            > These artifacts are automatically rebuilt on every push to
            > `main` and may be unstable. For tagged releases see the
            > non-prerelease entries.
          files: |
            artifacts/**/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
